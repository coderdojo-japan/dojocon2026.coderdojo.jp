<!DOCTYPE html>

<html lang="ja" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0" />
    <!--[if IE]><meta http-equiv="X-UA-Compatible" content="IE=edge"/><![endif]-->

    <!-- Settings for social web services (as minimum as possible) -->
    <title>DojoCon Japan 2026 - CoderDojo コミュニティのための全国カンファレンス</title>
    <meta name="description" content="DojoCon Japan とは日本の CoderDojo コミュニティメンバーが全国から集まるカンファレンスイベント (CoderDojo Conference) です。2016年に始まり、毎年１回のペースで開催しています。" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://dojocon2026.coderdojo.jp/images/cover.jpg" />
    <meta name="twitter:card" content="summary" />

    <!-- Settings for web browsers and mobiles like icons -->
    <link rel="canonical" href="https://dojocon2026.coderdojo.jp/" />
    <link rel="shortlink" href="https://dojocon2026.coderdojo.jp/" />
    <link rel="icon" href="/images/coderdojo.svg" sizes="any" type="image/svg+xml" />
    <link rel="icon" href="/images/coderdojo.webp" sizes="512" type="image/webp" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!-- 180x180px -->

    <style type="text/css">
      @import "https://fonts.googleapis.com/css2?family=Space+Mono&display=swap";
      html {
        scroll-behavior: smooth;
      }
      body {
        font-family: "Roboto", "Noto Sans JP", sans-serif;
        margin: 0;
        text-align: center;
        color: #046;
        padding-top: 60px;
      }
      .container {
        text-align: center;
        font-size: 4vw;
        font-family: "Space Mono";
      }

      .cursor::after {
        content: "_";
        animation: blink 1s infinite;
      }
      @keyframes blink {
        0% {
          opacity: 0;
        }
        50% {
          opacity: 0;
        }
        51% {
          opacity: 1;
        }
        100% {
          opacity: 1;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div style="margin-top: 1.0em;">
        <img src="/images/logo.webp" loading="lazy" width="50%" alt="CoderDojo Logo" title="CoderDojo Logo" />
      </div>
      <div style="margin-top: 1.0em;">DojoCon Japan 2026</div>
      <div style="margin-top: 0.0em;">現在未定</div>
      <div style="margin-top: 0.5em;">2026年11月1日（日）開催予定!</div>
      <div style="margin-top: 0.5em;"><a href="https://www.odette.or.jp/plaza-odette/" target="_blank" style="color: #046;">プラザおでって</a></div>
      <div style="margin-top: 0.5em;" class="cursor">SAVE THE DATE</div>
      <div style="margin-top: 2.0em;">
        <img src="/images/cover-photo.webp" loading="lazy" width="100%" alt="DojoCon Japan 2026 Teaser Cover Photo" title="DojoCon Japan 2026 Teaser Cover Photo" />
      </div>

      <div style="margin-top: 2.0em; margin-bottom: 0.5em; font-size: 55%;">
        <a href="https://dojocon.coderdojo.jp/" style="text-decoration: none;">
          &raquo; DojoCon Japan（全国イベント）の開催事例を見る
        </a>
      </div>
      <div style="margin-top: 2.0em; margin-bottom: 5.5em; font-size: 55%;">
        <small>
          DojoCon Japan 実行委員会<br />
          一般社団法人 CoderDojo Japan
        </small>
      </div>
    </div>
  </body>
</html>
