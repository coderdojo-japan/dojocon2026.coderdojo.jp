<!doctype html>

<html lang="ja" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0" />
    <!--[if IE]><meta http-equiv="X-UA-Compatible" content="IE=edge" /><![endif]-->

    <!-- Settings for social web services (as minimum as possible) -->
    <title>DojoCon Japan 2026 - CoderDojo コミュニティのための全国カンファレンス</title>
    <meta
      name="description"
      content="DojoCon Japan とは日本の CoderDojo コミュニティメンバーが全国から集まるカンファレンスイベント (CoderDojo Conference) です。2016年に始まり、毎年１回のペースで開催しています。"
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://dojocon2026.coderdojo.jp/images/cover.jpg" />
    <meta name="twitter:card" content="summary" />

    <!-- Settings for web browsers and mobiles like icons -->
    <link rel="canonical" href="https://dojocon2026.coderdojo.jp/" />
    <link rel="shortlink" href="https://dojocon2026.coderdojo.jp/" />
    <link rel="icon" href="/images/coderdojo.svg" sizes="any" type="image/svg+xml" />
    <link rel="icon" href="/images/coderdojo.webp" sizes="512" type="image/webp" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!-- 180x180px -->

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono&display=swap" rel="stylesheet" />

    <style type="text/css">
      html {
        scroll-behavior: smooth;
      }

      body {
        font-family: "Roboto", "Noto Sans JP", sans-serif;
        margin: 0;
        padding: 0;
        color: #fff;
        overflow-x: hidden;
      }

      /* ===== Hero Section ===== */
      .hero {
        position: relative;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: url("/images/cover-photo.webp") center center / cover no-repeat;
        background-color: #002244;
      }

      .hero-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0, 34, 68, 0.6);
      }

      .hero-content {
        position: relative;
        z-index: 1;
        text-align: center;
        font-family: "Space Mono", monospace;
        padding: 2rem 1rem;
      }

      .hero-logo {
        width: clamp(120px, 18vw, 280px);
        margin-bottom: 1.5rem;
      }

      .hero-save-the-date {
        font-size: clamp(1.8rem, 6vw, 4.5rem);
        font-weight: bold;
        letter-spacing: 0.05em;
        margin-bottom: 0.8rem;
      }

      .hero-title {
        font-size: clamp(1rem, 3vw, 2rem);
        font-weight: normal;
        letter-spacing: 0.1em;
        margin: 0 0 1.2rem;
        opacity: 0.9;
      }

      .hero-date {
        font-size: clamp(1.2rem, 3.5vw, 2.2rem);
        font-weight: bold;
        margin-bottom: 0.6rem;
      }

      .hero-venue a {
        color: #fff;
        text-decoration: underline;
        text-underline-offset: 4px;
        font-size: clamp(0.9rem, 2.5vw, 1.5rem);
      }

      .hero-venue a:hover {
        opacity: 0.8;
      }

      .hero-theme {
        font-size: clamp(1rem, 2.5vw, 1.4rem);
        opacity: 0.85;
        margin-top: 2.5rem;
        letter-spacing: 0.15em;
      }

      /* Blink cursor */
      .cursor::after {
        content: "_";
        animation: blink 1s infinite;
      }

      @keyframes blink {
        0%,
        50% {
          opacity: 0;
        }
        51%,
        100% {
          opacity: 1;
        }
      }

      /* Fade-in animation */
      .fade-in {
        opacity: 0;
        transform: translateY(20px);
        animation: fadeInUp 0.8s ease forwards;
      }

      .fade-in:nth-child(1) {
        animation-delay: 0.2s;
      }
      .fade-in:nth-child(2) {
        animation-delay: 0.4s;
      }
      .fade-in:nth-child(3) {
        animation-delay: 0.6s;
      }
      .fade-in:nth-child(4) {
        animation-delay: 0.8s;
      }
      .fade-in:nth-child(5) {
        animation-delay: 1s;
      }
      .fade-in:nth-child(6) {
        animation-delay: 1.2s;
      }

      @keyframes fadeInUp {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ===== Footer Section ===== */
      .footer {
        background: #002244;
        color: #fff;
        text-align: center;
        font-family: "Space Mono", monospace;
        padding: 2.5rem 1rem;
      }

      .footer a {
        color: #fff;
        text-decoration: none;
        opacity: 0.8;
      }

      .footer a:hover {
        opacity: 1;
        text-decoration: underline;
      }

      .footer-links {
        font-size: clamp(0.7rem, 1.8vw, 0.95rem);
        margin-bottom: 1.5rem;
      }

      .footer-credit {
        font-size: clamp(0.6rem, 1.4vw, 0.8rem);
        opacity: 0.6;
        line-height: 1.8;
      }
    </style>
  </head>

  <body>
    <main>
      <!-- Hero Section -->
      <section class="hero">
        <div class="hero-overlay"></div>
        <div class="hero-content">
          <div class="fade-in">
            <img src="/images/logo.webp" class="hero-logo" alt="CoderDojo Logo" />
          </div>
          <p class="fade-in hero-save-the-date cursor">SAVE THE DATE</p>
          <h1 class="fade-in hero-title">DojoCon Japan 2026 in 盛岡</h1>
          <p class="fade-in hero-date">2026.11.01 SUN</p>
          <p class="fade-in hero-venue">
            岩手県盛岡市
            <a href="https://www.odette.or.jp/plaza-odette/" target="_blank" rel="noopener noreferrer"
              >プラザおでって</a
            >
          </p>
          <p class="fade-in hero-theme">テーマ: わかちあう、わかりあう</p>
        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <div class="footer-links">
        <a href="https://dojocon.coderdojo.jp/" rel="noopener noreferrer">
          &raquo; DojoCon Japan（全国イベント）の開催事例を見る
        </a>
      </div>
      <div class="footer-credit">
        <small>
          DojoCon Japan 実行委員会<br />
          一般社団法人 CoderDojo Japan
        </small>
      </div>
    </footer>
  </body>
</html>
