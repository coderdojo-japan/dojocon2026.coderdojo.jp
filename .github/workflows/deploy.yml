name: Deploy to GitHub Pages

on:
  # main ブランチへの push で自動デプロイ
  push:
    branches: [main]
  # Actions タブから手動実行も可能
  workflow_dispatch:

# GitHub Pages へのデプロイに必要な権限
permissions:
  contents: read
  pages: write
  id-token: write

# 同時に 1 つのデプロイのみ実行（進行中のものは完了させる）
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Astro 6 は Node 22.12+ が必須
          node-version: 22
          cache: npm

      # npm ci は node_modules を作り直し、ロックファイルから厳密に
      # インストールするため、プラットフォーム別ネイティブ依存
      # (@rollup/rollup-linux-x64-gnu 等) も正しく解決される。
      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
